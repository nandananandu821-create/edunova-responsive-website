<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset style="width: 500px">
        <legend>Employee Details</legend>
        First name: <input type="text"><br><br>
        Last name: <input type="text"><br><br>
        <input type="radio">Male <input type="radio">Female <br><br>
        Employee ID: <input type="text"><br><br>
        Designation: <input type="text"><br><br>
        Phone Number: <input type="text"><br><br>
        <input type="submit">
    </fieldset>
    <br><br>
    <table>
        <tr>
            <th colspan="2">Novell Services Login</th>
        </tr>
        <tr>
            <td>Username:</td>
            <td><input type="text"></td>
        </tr>
        <tr>
            <td>Password:</td>
            <td><input type="text"></td>
        </tr>
        <tr>
            <td>City of <br> Employment:</td>
            <td><input type="text"></td>
        </tr>
        <tr>
            <td>Web server</td>
            <td><select>
                <option>--choose a server--</option>
            </select></td>
        </tr>
        <tr>
            <td>Please specify <br> your role:</td>
            <td>
                <input type="radio">Admin <br>
                <input type="radio">Enginee <br>
                <input type="radio">Manager <br>
                <input type="radio">Guest <br>
            </td>
        </tr>
        <tr>
            <td>Single sign-on <br>to the following</td>
            <td>
                <input type="checkbox">Mail <br>
                <input type="checkbox">Payroll <br>
                <input type="checkbox">Self-service <br>
            </td>
        </tr>
        <tr>
            <th colspan="2"><input type="submit" value="Login"><input type="reset"></th>
        </tr>

    </table>
    
        

</body>
</html>
